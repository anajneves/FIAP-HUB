    * { box-sizing: border-box; }

    .cal-day { min-height: 36px; border-radius: 2px; cursor: pointer; transition: background 0.15s; display: flex; flex-direction: column; align-items: center; padding-top: 4px; gap: 2px; font-size: 12px; }
    .cal-day:hover { background: #1a1a1a; }
    .cal-day.today { color: #ED145B; font-weight: 600; }
    .cal-day.other-month { color: #444; }
    .dot { width: 4px; height: 4px; border-radius: 50%; }
    .todo-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; border-bottom: 1px solid #1a1a1a; }
    .todo-item.done span.todo-text { text-decoration: line-through; color: #555; }
    .todo-check { width: 16px; height: 16px; border: 1px solid #444; border-radius: 2px; cursor: pointer; flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .todo-check.checked { background: #ED145B; border-color: #ED145B; }
    input, textarea, select { background: #161616; border: 1px solid #2a2a2a; color: #e4e4e7; border-radius: 3px; padding: 8px 10px; font-family: inherit; font-size: 14px; outline: none; width: 100%; }
    input:focus, textarea:focus, select:focus { border-color: #ED145B; }
    .btn { cursor: pointer; border: none; border-radius: 3px; padding: 8px 16px; font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; transition: all 0.15s; }
    .btn-primary { background: #ED145B; color: white; } .btn-primary:hover { background: #c9104d; }
    .btn-ghost { background: transparent; color: #888; border: 1px solid #2a2a2a; } .btn-ghost:hover { border-color: #444; color: #ccc; }
    .side-panel { position: fixed; top: 0; right: 0; height: 100vh; width: 380px; background: #0d0d0d; border-left: 1px solid #1f1f1f; z-index: 50; overflow-y: auto; transform: translateX(100%); transition: transform 0.25s ease; }
    .side-panel.open { transform: translateX(0); }
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 40; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
    .overlay.active { opacity: 1; pointer-events: all; }
    .progress-bar { height: 2px; background: #1f1f1f; border-radius: 1px; overflow: hidden; }
    .progress-fill { height: 100%; background: #ED145B; border-radius: 1px; transition: width 0.5s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .section-content { animation: fadeIn 0.2s ease; }
    .low-stim * { animation: none !important; transition: none !important; }
    .low-stim .progress-fill { transition: none !important; }
  </style>
</head>

    Linkedin:     ({s=16,c=''})=>h('svg',{xmlns:"http://www.w3.org/2000/svg",width:s,height:s,viewBox:"0 0 24 24",fill:"none",stroke:"currentColor",strokeWidth:2,strokeLinecap:"round",strokeLinejoin:"round",className:c},h('path',{d:"M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"}),h('rect',{x:2,y:9,width:4,height:12}),h('circle',{cx:4,cy:4,r:2})),
  };

  // ── STATIC DATA ───────────────────────────────────────────────────
  const ACADEMIC_TASKS = [
    { id:'t1', titulo:'Conhecendo o Cliente com Profundidade', tipo:'Grupo', prazoBase:'2026-05-14', prazoAdaptado:'2026-05-21', origem:'FIAP', concluido:false },
    { id:'t2', titulo:'Quiz Fase 3 + Fast Test (Nice to meet you...)', tipo:'Individual', prazoBase:'2026-05-19', prazoAdaptado:'2026-05-26', origem:'FIAP', concluido:false },

    { id:'t5', titulo:'Quiz Fase 1 (Basics Fundamentals)', tipo:'Individual', prazoBase:'2026-06-20', prazoAdaptado:'2026-06-27', origem:'FIAP', concluido:false },
    { id:'t6', titulo:'Quiz Fase 2 + Fast Test (Deep Dive...)', tipo:'Individual', prazoBase:'2026-06-20', prazoAdaptado:'2026-06-27', origem:'FIAP', concluido:false },
  ];

  const NANO_COURSES = [
    { id:'c1', titulo:'Customer Experience Management', carga:'40H', status:'disponivel', progresso:0, bg:'#1a0a14' },
    { id:'c2', titulo:'Agile Culture & Methodologies', carga:'60H', status:'progresso', progresso:35, bg:'#0a101a' },
    { id:'c3', titulo:'Data Driven Decision Making', carga:'30H', status:'disponivel', progresso:0, bg:'#0d1a0a' },

  const BASE_EVENTS = [
    { id:'e1', data:'2026-04-27', hora:'19:30', titulo:'Sessão Psiquiatria', cat:'saude' },
    { id:'e2', data:'2026-04-28', hora:'11:30', titulo:'Daily | Social Media', cat:'lucca' },

    { id:'e5', data:'2026-05-19', hora:'23:59', titulo:'Entrega: Quiz Fase 3 + Challenge', cat:'fiap' },
    { id:'e6', data:'2026-06-20', hora:'23:59', titulo:'Entrega: Quiz Fase 1 e 2', cat:'fiap' },

  const CAT_COLORS = { fiap:'#ED145B', lucca:'#3b82f6', saude:'#10b981', pessoal:'#a78bfa', estudo:'#f59e0b', trabalho:'#f97316' };
  const CAT_LABELS = { fiap:'FIAP', lucca:'Lucca', saude:'Saúde', pessoal:'Pessoal', estudo:'Estudo', trabalho:'Trabalho' };
  const MONTHS_PT = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

  // ── HELPERS ───────────────────────────────────────────────────────
  const LS = {
    get: (k, def) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : def; } catch { return def; } },
    set: (k, v)   => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
  };

  const today = () => { const d = new Date(); return d.toISOString().split('T')[0]; };
  const fmtDate = iso => {
    if (!iso) return '';
    const [y,m,d] = iso.split('-');
    const months = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
    return d + ' ' + months[parseInt(m)-1] + ' ' + y;
  };
  const daysUntil = iso => {
    if (!iso) return null;
    const diff = new Date(iso+'T00:00:00') - new Date(today()+'T00:00:00');
    return Math.ceil(diff / 86400000);
  };
  const urgencyColor = days => days <= 3 ? '#ED145B' : days <= 7 ? '#f59e0b' : '#6b7280';

  function TodoItem({ item, onToggle, onDelete }) {
    return h('div', { className: 'todo-item' + (item.done ? ' done' : '') },
      h('div', {
        className: 'todo-check' + (item.done ? ' checked' : ''),
        onClick: () => onToggle(item.id)
      }, item.done ? h(Ic.Check, {s:10, c:'text-white'}) : null),
      h('div', { style:{flex:1, minWidth:0} },
        h('span', { className:'todo-text text-sm leading-snug', style:{display:'block'} }, item.texto),
        h('div', { style:{display:'flex', gap:6, marginTop:4, alignItems:'center'} },

          item.prazo ? h('span', { className:'text-xs', style:{color: urgencyColor(daysUntil(item.prazo))} },
            daysUntil(item.prazo) < 0 ? 'vencida' : daysUntil(item.prazo) === 0 ? 'hoje' : fmtDate(item.prazo)
          ) : null
        )
      ),
      h('button', { onClick: () => onDelete(item.id), style:{background:'none',border:'none',color:'#444',cursor:'pointer',padding:'2px',flexShrink:0}, title:'Remover' },
        h(Ic.Trash, {s:13})
      )
    );
  }

  // ── CALENDAR COMPONENT ────────────────────────────────────────────
  function CalendarView({ events }) {
    const now = new Date();
    const [year, setYear]   = useState(now.getFullYear());
    const [month, setMonth] = useState(now.getMonth());
    const [selected, setSelected] = useState(null);

    const prevMonth = () => { if (month === 0) { setYear(y=>y-1); setMonth(11); } else setMonth(m=>m-1); };
    const nextMonth = () => { if (month === 11) { setYear(y=>y+1); setMonth(0); } else setMonth(m=>m+1); };

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month+1, 0).getDate();
    const daysInPrev  = new Date(year, month, 0).getDate();
    const todayStr = today();

    // Build event map: date -> array of events
    const evtMap = {};
    events.forEach(ev => {
      if (!evtMap[ev.data]) evtMap[ev.data] = [];
      evtMap[ev.data].push(ev);
    });

    const cells = [];
    // Previous month days
    for (let i = firstDay - 1; i >= 0; i--) {
      const d = daysInPrev - i;
      cells.push({ day: d, month: 'prev', key: 'p' + d });
    }
    // Current month days
    for (let d = 1; d <= daysInMonth; d++) {
      const mm = String(month+1).padStart(2,'0');
      const dd = String(d).padStart(2,'0');
      const iso = year + '-' + mm + '-' + dd;
      cells.push({ day: d, month: 'cur', iso, key: iso, evts: evtMap[iso] || [] });
    }
    // Next month days
    const remaining = 42 - cells.length;
    for (let d = 1; d <= remaining; d++) {
      cells.push({ day: d, month: 'next', key: 'n' + d });
    }

    const selectedEvts = selected ? (evtMap[selected] || []) : [];

    return h('div', { style:{display:'flex', gap:24, flexWrap:'wrap'} },
      // Calendar grid
      h('div', { style:{flex:'1 1 340px'} },
        // Header
        h('div', { style:{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:16} },
          h('button', { onClick:prevMonth, className:'btn btn-ghost', style:{padding:'4px 8px'} }, h(Ic.ChevronLeft,{s:14})),
          h('span', { style:{fontFamily:'JetBrains Mono, monospace', fontSize:13, letterSpacing:'0.06em', color:'#aaa'} },
            MONTHS_PT[month] + ' ' + year
          ),
          h('button', { onClick:nextMonth, className:'btn btn-ghost', style:{padding:'4px 8px'} }, h(Ic.ChevronRight,{s:14}))
        ),
        // Day headers
        h('div', { style:{display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:2, marginBottom:4} },
          ...DAYS_PT.map(d => h('div', { key:d, style:{textAlign:'center', fontSize:10, color:'#555', fontFamily:'JetBrains Mono,monospace', padding:'4px 0', letterSpacing:'0.06em'} }, d))
        ),
        // Day cells
        h('div', { style:{display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:2} },
          ...cells.map(cell =>
            h('div', {
              key: cell.key,
              className: 'cal-day' + (cell.iso === todayStr ? ' today' : '') + (cell.month !== 'cur' ? ' other-month' : ''),
              style: selected === cell.iso ? {background:'#1f1f1f', outline:'1px solid #333'} : {},
              onClick: cell.iso ? () => setSelected(cell.iso === selected ? null : cell.iso) : undefined
            },
              h('span', {}, cell.day),
              cell.evts && cell.evts.length > 0
                ? h('div', { style:{display:'flex', gap:2, flexWrap:'wrap', justifyContent:'center'} },
                    ...cell.evts.map((ev,i) => h('div', { key:i, className:'dot', style:{background: CAT_COLORS[ev.cat] || '#888'} }))
                  )
                : null
            )
          )
        )
      ),
      // Event detail panel
      h('div', { style:{flex:'1 1 260px', minWidth:220} },
        selected
          ? h('div', {},
              h('div', { style:{fontFamily:'JetBrains Mono,monospace', fontSize:10, letterSpacing:'0.08em', color:'#555', marginBottom:12} }, fmtDate(selected).toUpperCase()),
              selectedEvts.length === 0
                ? h('p', { style:{color:'#444', fontSize:13} }, 'Nenhum evento neste dia.')
                : selectedEvts.map((ev,i) =>
                    h('div', { key:i, style:{padding:'10px 12px', background:'#111', border:'1px solid #222', borderRadius:3, marginBottom:8, borderLeft:'3px solid ' + (CAT_COLORS[ev.cat]||'#333')} },
                      h('div', { style:{fontSize:14, marginBottom:4} }, ev.titulo),
                      h('div', { style:{display:'flex', gap:8, alignItems:'center'} },
                        ev.hora ? h('span', { style:{fontFamily:'JetBrains Mono,monospace', fontSize:11, color:'#888'} }, ev.hora) : null,
                        h('span', { className:'tag', style:{background:'#1a1a1a', color: CAT_COLORS[ev.cat]||'#888'} }, CAT_LABELS[ev.cat]||ev.cat)
                      )
                    )
                  )
            )
          : h('div', { style:{color:'#444', fontSize:13, paddingTop:8} },
              h('p', {}, 'Clique em um dia para ver os eventos.'),
              events.length > 0
                ? h('div', { style:{marginTop:16} },
                    h('div', { style:{fontFamily:'JetBrains Mono,monospace', fontSize:10, color:'#555', letterSpacing:'0.08em', marginBottom:10} }, 'PRÓXIMOS'),
                    events
                      .filter(ev => ev.data >= todayStr)
                      .sort((a,b) => a.data.localeCompare(b.data))
                      .slice(0,5)
                      .map((ev,i) => h('div', { key:i, style:{padding:'8px 0', borderBottom:'1px solid #1a1a1a', display:'flex', gap:10, alignItems:'flex-start'} },
                        h('div', { style:{width:3, minHeight:16, background: CAT_COLORS[ev.cat]||'#333', borderRadius:1, marginTop:3, flexShrink:0} }),
                        h('div', {},
                          h('div', { style:{fontSize:13, lineHeight:'1.3'} }, ev.titulo),
                          h('div', { style:{fontSize:11, color:'#666', fontFamily:'JetBrains Mono,monospace', marginTop:2} }, fmtDate(ev.data) + (ev.hora ? ' · '+ev.hora : ''))
                        )
                      ))
                  )
                : null
            )
      )
    );
  }

  // ── MAIN APP ──────────────────────────────────────────────────────
  function App() {
    const [section, setSection]       = useState('hoje');
    const [lowStim, setLowStim]       = useState(() => LS.get('lowStim', false));
    const [showSistema, setShowSistema] = useState(false);
    const [showAddTodo, setShowAddTodo] = useState(false);
    const [showAddEvent, setShowAddEvent] = useState(false);

    // Tasks (academic) - status persisted
    const [taskStatus, setTaskStatus] = useState(() => LS.get('taskStatus', {}));
    const toggleTask = id => {
      const next = {...taskStatus, [id]: !taskStatus[id]};
      setTaskStatus(next); LS.set('taskStatus', next);
    };

    // Personal To-Do with localStorage
    const [todos, setTodos] = useState(() => LS.get('todos', []));
    const [newTodo, setNewTodo] = useState({ texto:'', cat:'pessoal', prazo:'' });
    const addTodo = () => {
      if (!newTodo.texto.trim()) return;
      const next = [...todos, { id: Date.now().toString(), ...newTodo, done:false }];
      setTodos(next); LS.set('todos', next);
      setNewTodo({ texto:'', cat:'pessoal', prazo:'' });
      setShowAddTodo(false);
    };
    const toggleTodo = id => {
      const next = todos.map(t => t.id === id ? {...t, done:!t.done} : t);
      setTodos(next); LS.set('todos', next);
    };
    const deleteTodo = id => {
      const next = todos.filter(t => t.id !== id);
      setTodos(next); LS.set('todos', next);
    };
    const clearDone = () => {
      const next = todos.filter(t => !t.done);
      setTodos(next); LS.set('todos', next);
    };

    // Events (personal additions to calendar)
    const [customEvents, setCustomEvents] = useState(() => LS.get('customEvents', []));
    const [newEvent, setNewEvent] = useState({ data:'', hora:'', titulo:'', cat:'pessoal' });
    const addEvent = () => {
      if (!newEvent.data || !newEvent.titulo.trim()) return;
      const next = [...customEvents, { id:'ce'+Date.now(), ...newEvent }];
      setCustomEvents(next); LS.set('customEvents', next);
      setNewEvent({ data:'', hora:'', titulo:'', cat:'pessoal' });
      setShowAddEvent(false);
    };
    const deleteEvent = id => {
      const next = customEvents.filter(e => e.id !== id);
      setCustomEvents(next); LS.set('customEvents', next);
    };

    // Course progress persisted
    const [courseProgress, setCourseProgress] = useState(() => LS.get('courseProgress', {}));
    const updateProgress = (id, val) => {
      const next = {...courseProgress, [id]: val};
      setCourseProgress(next); LS.set('courseProgress', next);
    };

    // All events merged
    const allEvents = [...BASE_EVENTS, ...customEvents];

    // Compute priority task (nearest deadline not done)
    const todayStr = today();
    const priority = ACADEMIC_TASKS
      .filter(t => !taskStatus[t.id] && t.prazoAdaptado >= todayStr)
      .sort((a,b) => a.prazoAdaptado.localeCompare(b.prazoAdaptado))[0];

    // Upcoming events (next 5)
    const upcomingEvents = allEvents
      .filter(e => e.data >= todayStr)
      .sort((a,b) => a.data.localeCompare(b.data))
      .slice(0,5);

    useEffect(() => {
      document.body.classList.toggle('low-stim', lowStim);
      LS.set('lowStim', lowStim);
    }, [lowStim]);

    // ── NAV ──────────────────────────────────────────────────────────
    const NavItem = ({id, label}) => h('button', {
      onClick: () => setSection(id),
      className: 'nav-link btn-ghost btn' + (section===id ? ' active' : ''),
      style: {padding:'6px 12px', fontSize:11}
    }, label);

    return h('div', { style:{minHeight:'100vh'} },

      // ── OVERLAY ──────────────────────────────────────────────────
      h('div', { className:'overlay'+(showSistema?' active':''), onClick:()=>setShowSistema(false) }),

      // ── HEADER ───────────────────────────────────────────────────
      h('header', { style:{borderBottom:'1px solid #1a1a1a', padding:'0 32px', display:'flex', alignItems:'center', justifyContent:'space-between', height:56, position:'sticky', top:0, background:'#0a0a0a', zIndex:30} },
        h('div', { style:{display:'flex', alignItems:'center', gap:24} },
          h('div', { style:{display:'flex', alignItems:'center', gap:10} },
            h('div', { style:{width:32, height:32, borderRadius:'50%', background:'#1a1a1a', border:'2px solid #2a2a2a', display:'flex', alignItems:'center', justifyContent:'center', fontSize:12, fontWeight:600, color:'#ED145B', fontFamily:'JetBrains Mono,monospace'} }, 'AJ'),
            h('div', {},
              h('div', { style:{fontSize:13, fontWeight:500, lineHeight:'1.2'} }, 'Ana Julia Neves'),
              h('div', { style:{fontSize:10, color:'#555', fontFamily:'JetBrains Mono,monospace', letterSpacing:'0.06em'} }, 'RM571965 · J.ONE HUB')
            )
          ),
          h('nav', { style:{display:'flex', gap:4} },
            h(NavItem, {id:'hoje', label:'HOJE'}),
            h(NavItem, {id:'calendario', label:'CALENDÁRIO'}),
            h(NavItem, {id:'tarefas', label:'TAREFAS'}),
            h(NavItem, {id:'cursos', label:'CURSOS'})
          )
        ),
        h('div', { style:{display:'flex', gap:8} },
          h('button', {
            onClick: () => setLowStim(v=>!v),
            className: 'btn btn-ghost',
            style: { fontSize:10, gap:6, display:'flex', alignItems:'center', color: lowStim?'#ED145B':'#888', borderColor: lowStim?'#ED145B':'#2a2a2a' }
          }, h(Ic.Moon,{s:12}), lowStim ? 'LOW-STIM' : 'LOW-STIM'),
          h('button', { onClick:()=>setShowSistema(true), className:'btn btn-ghost', style:{padding:'6px 10px'} },
            h(Ic.Settings,{s:14})
          )
        )
      ),

      // ── MAIN ─────────────────────────────────────────────────────
      h('main', { style:{maxWidth:1200, margin:'0 auto', padding:'32px 32px'} },

        // ═══ SEÇÃO: HOJE ════════════════════════════════════════════
        section === 'hoje' && h('div', { className:'section-content' },
          // Quick access
          h('div', { style:{display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:12, marginBottom:32} },
            [
              { label:'FIAP ON', sub:'Ambiente Oficial', icon: h(Ic.BookOpen,{s:16,c:'text-red-500'}), url:'https://on.fiap.com.br', color:'#ED145B' },
              { label:'Alura', sub:'Cursos & Skills', icon: h(Ic.PlayCircle,{s:16,c:'text-blue-400'}), url:'https://cursos.alura.com.br', color:'#3b82f6' },
              { label:'LinkedIn', sub:'Networking', icon: h(Ic.Linkedin,{s:16,c:'text-zinc-400'}), url:'https://linkedin.com/in/anajuneves', color:'#888' },
            ].map((item,i) => h('a', { key:i, href:item.url, target:'_blank', rel:'noopener noreferrer',
              className:'card',
              style:{padding:'14px 16px', display:'flex', alignItems:'center', gap:12, textDecoration:'none', color:'inherit', transition:'border-color 0.15s'},
              onMouseEnter: e => e.currentTarget.style.borderColor = item.color,
              onMouseLeave: e => e.currentTarget.style.borderColor = '#222'

              h('div', { style:{opacity:0.8} }, item.icon),
              h('div', {},

                h('div', { style:{fontSize:10, color:'#666', fontFamily:'JetBrains Mono,monospace', letterSpacing:'0.06em', marginTop:2} }, item.sub)
              ),
              h('div', { style:{marginLeft:'auto'} }, h(Ic.ExternalLink,{s:12,c:'text-zinc-700'}))

          ),

          // Priority + Agenda row
          h('div', { style:{display:'grid', gridTemplateColumns:'1fr 340px', gap:24, marginBottom:32} },

            // Priority card
            priority
              ? h('div', { className:'card', style:{padding:'24px 28px'} },
                  h('div', { style:{fontFamily:'JetBrains Mono,monospace', fontSize:10, color:'#ED145B', letterSpacing:'0.1em', marginBottom:12} }, 'AÇÃO PRIORITÁRIA'),
                  h('div', { style:{display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:16} },
                    h('div', {},
                      h('h2', { style:{fontSize:22, fontWeight:300, fontStyle:'italic', lineHeight:1.2, marginBottom:8, margin:0} }, priority.titulo),
                      h('div', { style:{display:'flex', gap:8, marginTop:10, alignItems:'center'} },
                        h('span', { className:'tag', style:{background:'#1a1a1a', color:'#888'} }, priority.tipo),
                        h('span', { className:'tag', style:{background:'#1a1a1a', color: CAT_COLORS[priority.origem?.toLowerCase()]||'#888'} }, priority.origem)

                    ),
                    h('div', { style:{textAlign:'right', flexShrink:0} },
                      h('div', { style:{fontSize:48, fontWeight:300, lineHeight:1, color: urgencyColor(daysUntil(priority.prazoAdaptado))} }, daysUntil(priority.prazoAdaptado)),
                      h('div', { style:{fontSize:10, color:'#555', fontFamily:'JetBrains Mono,monospace', letterSpacing:'0.06em'} }, 'DIAS DE MARGEM')
                    )
                  ),
                  h('div', { style:{display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, marginTop:20} },
                    h('div', { style:{background:'#0d0d0d', borderRadius:3, padding:'10px 14px'} },
                      h('div', { style:{fontSize:10, color:'#444', fontFamily:'JetBrains Mono,monospace', letterSpacing:'0.06em', marginBottom:4} }, 'PRAZO BASE'),

                    h('div', { style:{background:'#1a0810', border:'1px solid #3d0a1f', borderRadius:3, padding:'10px 14px'} },
                      h('div', { style:{fontSize:10, color:'#ED145B', fontFamily:'JetBrains Mono,monospace', letterSpacing:'0.06em', marginBottom:4} }, 'SEU PRAZO ADAPTADO'),
                      h('div', { style:{fontSize:15, color:'#e4e4e7'} }, fmtDate(priority.prazoAdaptado))

                  )
                )
              : h('div', { className:'card', style:{padding:'24px 28px', display:'flex', alignItems:'center', justifyContent:'center'} },
                  h('div', { style:{textAlign:'center', color:'#555'} },
                    h(Ic.CheckCircle,{s:32,c:'text-zinc-700'}),
                    h('p', { style:{marginTop:12, fontSize:14} }, 'Nenhuma entrega pendente. 🎉')
                  )
                ),

            // Agenda
            h('div', { className:'card', style:{padding:'20px'} },
              h('div', { style:{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:14} },
                h('span', { style:{fontFamily:'JetBrains Mono,monospace', fontSize:10, color:'#666', letterSpacing:'0.08em'} }, 'AGENDA'),
                h('button', { onClick:()=>setShowAddEvent(true), style:{background:'none',border:'none',color:'#555',cursor:'pointer',padding:2}, title:'Adicionar evento' }, h(Ic.Plus,{s:14}))
              ),
              upcomingEvents.length === 0
                ? h('p', { style:{color:'#444', fontSize:13} }, 'Sem eventos próximos.')
                : upcomingEvents.map((ev,i) =>
                    h('div', { key:ev.id, style:{padding:'8px 0', borderBottom: i < upcomingEvents.length-1 ? '1px solid #1a1a1a' : 'none', display:'flex', gap:10, alignItems:'flex-start'} },
                      h('div', { style:{width:3, minHeight:16, background: CAT_COLORS[ev.cat]||'#333', borderRadius:1, marginTop:3, flexShrink:0} }),
                      h('div', { style:{flex:1, minWidth:0} },
                        h('div', { style:{fontSize:12, lineHeight:'1.3', color: ev.data === todayStr ? '#e4e4e7' : '#aaa'} }, ev.titulo),
                        h('div', { style:{fontSize:10, color:'#555', fontFamily:'JetBrains Mono,monospace', marginTop:2} },
                          fmtDate(ev.data) + (ev.hora ? ' · ' + ev.hora : '')
                        )
                      ),
                      ev.id.startsWith('ce') ? h('button', { onClick:()=>deleteEvent(ev.id), style:{background:'none',border:'none',color:'#333',cursor:'pointer',padding:0}, title:'Remover' }, h(Ic.X,{s:11})) : null
                    )
                  )
            )
          ),

          // To-Do section
          h('div', { className:'card' },
            h('div', { style:{display:'flex', alignItems:'center', justifyContent:'space-between', padding:'16px 20px', borderBottom:'1px solid #1a1a1a'} },
              h('span', { style:{fontFamily:'JetBrains Mono,monospace', fontSize:10, color:'#666', letterSpacing:'0.08em'} }, 'TO-DO PESSOAL'),
              h('div', { style:{display:'flex', gap:8} },
                todos.some(t=>t.done) ? h('button', { onClick:clearDone, className:'btn btn-ghost', style:{fontSize:10, padding:'4px 10px'} }, 'Limpar concluídas') : null,
                h('button', { onClick:()=>setShowAddTodo(v=>!v), className:'btn btn-primary', style:{fontSize:10, padding:'4px 10px', display:'flex', alignItems:'center', gap:5} },
                  h(Ic.Plus,{s:11}), 'NOVA TAREFA'
                )
              )
            ),
            showAddTodo && h('div', { style:{padding:'16px 20px', borderBottom:'1px solid #1a1a1a', background:'#0d0d0d'} },
              h('div', { style:{display:'grid', gridTemplateColumns:'1fr 140px 140px', gap:10, marginBottom:10} },
                h('input', { placeholder:'Descrição da tarefa...', value:newTodo.texto, onChange:e=>setNewTodo(v=>({...v,texto:e.target.value})),
                  onKeyDown: e => e.key==='Enter' && addTodo() }),
                h('select', { value:newTodo.cat, onChange:e=>setNewTodo(v=>({...v,cat:e.target.value})) },
                  Object.entries(CAT_LABELS).map(([k,l])=>h('option',{key:k,value:k},l))
                ),
                h('input', { type:'date', value:newTodo.prazo, onChange:e=>setNewTodo(v=>({...v,prazo:e.target.value})) })
              ),
              h('div', { style:{display:'flex', gap:8} },
                h('button', { onClick:addTodo, className:'btn btn-primary', style:{fontSize:10} }, 'Adicionar'),
                h('button', { onClick:()=>setShowAddTodo(false), className:'btn btn-ghost', style:{fontSize:10} }, 'Cancelar')
              )
            ),
            todos.length === 0 && !showAddTodo
              ? h('div', { style:{padding:'24px 20px', color:'#444', fontSize:13, textAlign:'center'} }, 'Nenhuma tarefa ainda. Clique em "Nova Tarefa" para começar.')
              : h('div', {},
                  ...['pessoal','saude','trabalho','estudo'].map(cat => {
                    const catTodos = todos.filter(t => t.cat === cat);
                    if (catTodos.length === 0) return null;
                    return h('div', { key:cat },
                      h('div', { style:{padding:'6px 20px', background:'#0d0d0d', fontSize:10, color: CAT_COLORS[cat], fontFamily:'JetBrains Mono,monospace', letterSpacing:'0.08em', borderBottom:'1px solid #1a1a1a'} },
                        CAT_LABELS[cat]
                      ),
                      catTodos.map(t => h(TodoItem, { key:t.id, item:t, onToggle:toggleTodo, onDelete:deleteTodo }))
                    );
                  })
                )
          )
        ),

        // ═══ SEÇÃO: CALENDÁRIO ══════════════════════════════════════
        section === 'calendario' && h('div', { className:'section-content' },
          h('div', { style:{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:24} },
            h('h1', { style:{fontSize:20, fontWeight:300, fontStyle:'italic', margin:0} }, 'Calendário'),
            h('button', { onClick:()=>setShowAddEvent(true), className:'btn btn-primary', style:{fontSize:10, display:'flex', alignItems:'center', gap:6} },
              h(Ic.Plus,{s:12}), 'NOVO EVENTO'
            )
          ),
          h(CalendarView, { events: allEvents }),
          // Custom events list
          customEvents.length > 0 && h('div', { style:{marginTop:32} },
            h('div', { style:{fontFamily:'JetBrains Mono,monospace', fontSize:10, color:'#555', letterSpacing:'0.08em', marginBottom:12} }, 'SEUS EVENTOS'),
            h('div', { className:'card' },
              customEvents.map((ev,i) =>
                h('div', { key:ev.id, style:{display:'flex', alignItems:'center', gap:12, padding:'10px 16px', borderBottom: i<customEvents.length-1?'1px solid #1a1a1a':'none'} },
                  h('div', { style:{width:3, height:16, background:CAT_COLORS[ev.cat]||'#333', borderRadius:1, flexShrink:0} }),
                  h('div', { style:{flex:1} },
                    h('div', { style:{fontSize:13} }, ev.titulo),
                    h('div', { style:{fontSize:10, color:'#666', fontFamily:'JetBrains Mono,monospace', marginTop:2} },
                      fmtDate(ev.data) + (ev.hora ? ' · '+ev.hora : '') + ' · ' + (CAT_LABELS[ev.cat]||ev.cat)
                    )
                  ),
                  h('button', { onClick:()=>deleteEvent(ev.id), style:{background:'none',border:'none',color:'#444',cursor:'pointer'} }, h(Ic.Trash,{s:13}))
                )
              )
            )
          )

            ),
            h('div', { className:'card' },

                },
                  h('div', { className:'todo-check'+(done?' checked':''), onClick:()=>toggleTask(t.id) },

              ),
              todos.length === 0
                ? h('div', { style:{padding:'32px', color:'#444', fontSize:13, textAlign:'center'} }, 'Nenhuma tarefa pessoal ainda.')
                : h('div', {},
                    ...['pessoal','saude','trabalho','estudo'].map(cat => {
                      const catTodos = todos.filter(t => t.cat === cat);
                      if (catTodos.length === 0) return null;
                      return h('div', { key:cat },
                        h('div', { style:{padding:'6px 20px', background:'#0d0d0d', fontSize:10, color: CAT_COLORS[cat], fontFamily:'JetBrains Mono,monospace', letterSpacing:'0.08em', borderBottom:'1px solid #1a1a1a'} },
                          CAT_LABELS[cat]
                        ),
                        catTodos.map(t => h(TodoItem, { key:t.id, item:t, onToggle:toggleTodo, onDelete:deleteTodo }))
                      );
                    })
                  )
            )
          )
        ),

        // ═══ SEÇÃO: CURSOS ══════════════════════════════════════════
        section === 'cursos' && h('div', { className:'section-content' },
          h('div', { style:{marginBottom:20} },
            h('h2', { style:{fontSize:14, fontFamily:'JetBrains Mono,monospace', letterSpacing:'0.08em', color:'#666', margin:0, fontWeight:400} }, 'NANO COURSES FIAP (EXTRACURRICULARES)'),
          ),
          h('div', { style:{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(280px, 1fr))', gap:20} },
            NANO_COURSES.map(course => {
              const prog = courseProgress[course.id] ?? course.progresso;
              const status = prog >= 100 ? 'concluido' : prog > 0 ? 'progresso' : 'disponivel';
              return h('div', { key:course.id, className:'card', style:{overflow:'hidden'} },
                // Cover
                h('div', { style:{height:120, background:course.bg, position:'relative'} },
                  h('div', { style:{position:'absolute', top:10, left:10} },
                    h('span', { className:'tag', style:{
                      background: status==='concluido'?'#10b981':status==='progresso'?'#3b82f6':'#2a2a2a',
                      color:'white'
                    }},
                      status==='concluido'?'CONCLUÍDO':status==='progresso'?'EM PROGRESSO':'DISPONÍVEL'
                    )
                  )
                ),
                prog > 0 && h('div', { className:'progress-bar' },
                  h('div', { className:'progress-fill', style:{width: Math.min(prog,100)+'%'} })
                ),
                h('div', { style:{padding:'16px'} },
                  h('div', { style:{fontSize:15, fontWeight:400, marginBottom:4} }, course.titulo),
                  h('div', { style:{fontSize:10, color:'#666', fontFamily:'JetBrains Mono,monospace', letterSpacing:'0.06em', marginBottom:14} },
                    'NANO COURSE · ' + course.carga
                  ),
                  // Progress slider
                  prog > 0 && h('div', { style:{marginBottom:12} },
                    h('div', { style:{display:'flex', justifyContent:'space-between', fontSize:10, color:'#666', fontFamily:'JetBrains Mono,monospace', marginBottom:4} },
                      'PROGRESSO', prog + '%'
                    ),
                    h('input', { type:'range', min:0, max:100, value:prog,
                      onChange: e => updateProgress(course.id, parseInt(e.target.value)),
                      style:{width:'100%', accentColor:'#ED145B', cursor:'pointer'}
                    })
                  ),
                  h('button', {
                    onClick: () => {
                      if (prog === 0) updateProgress(course.id, 5);
                    },
                    className: 'btn' + (prog===0?' btn-ghost':' btn-primary'),
                    style:{width:'100%', display:'flex', alignItems:'center', justifyContent:'center', gap:6}
                  },
                    h(Ic.PlayCircle,{s:13}),
                    prog >= 100 ? 'CONCLUÍDO' : prog > 0 ? 'CONTINUAR CURSO' : 'INICIAR CURSO'
                  )
                )
              );
            })
          )
        )

      ), // end main

      // ── SISTEMA PANEL ────────────────────────────────────────────
      h('div', { className:'side-panel'+(showSistema?' open':'') },
        h('div', { style:{padding:'24px 24px 16px', borderBottom:'1px solid #1f1f1f', display:'flex', alignItems:'center', justifyContent:'space-between'} },
          h('span', { style:{fontFamily:'JetBrains Mono,monospace', fontSize:12, color:'#888', letterSpacing:'0.08em', display:'flex', alignItems:'center', gap:8} },
            h(Ic.Settings,{s:13}), 'CONTAS & SISTEMA'
          ),
          h('button', { onClick:()=>setShowSistema(false), style:{background:'none',border:'none',color:'#555',cursor:'pointer'} },
            h(Ic.X,{s:16})
          )
        ),
        h('div', { style:{padding:'20px 24px'} },
          h('div', { style:{fontSize:10, color:'#555', fontFamily:'JetBrains Mono,monospace', letterSpacing:'0.08em', marginBottom:14} }, 'CREDENCIAIS ACADÊMICAS'),
          [
            { label:'Portal FIAP ON', icon:h(Ic.BookOpen,{s:14,c:'text-red-500'}), login:'rm571965', senha:'••••••••••••', color:'#ED145B' },
            { label:'Plataforma Alura', icon:h(Ic.PlayCircle,{s:14,c:'text-blue-400'}), login:'anajuliamedicina@gmail.com', senha:'••••••••', color:'#3b82f6' },
            { label:'LinkedIn', icon:h(Ic.Linkedin,{s:14,c:'text-zinc-400'}), url:'linkedin.com/in/anajuneves', color:'#888' },
          ].map((item,i) => h('div', { key:i, style:{padding:'14px', background:'#111', border:'1px solid #1f1f1f', borderRadius:3, marginBottom:10} },
            h('div', { style:{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:8} },
              h('div', { style:{display:'flex', alignItems:'center', gap:8} },
                item.icon,
                h('span', { style:{fontSize:13} }, item.label)
              ),
              h('span', { className:'tag', style:{background:'#0a1f0a', color:'#10b981'} }, 'CONECTADO')
            ),
            item.login && h('div', { style:{fontSize:11, color:'#666', fontFamily:'JetBrains Mono,monospace', marginBottom:3} }, 'Login: ' + item.login),
            item.senha && h('div', { style:{fontSize:11, color:'#666', fontFamily:'JetBrains Mono,monospace'} }, 'Senha: ' + item.senha),
            item.url   && h('div', { style:{fontSize:11, color:'#666', fontFamily:'JetBrains Mono,monospace'} }, 'URL: ' + item.url)
          )),
          h('div', { style:{marginTop:24, padding:'14px', background:'#0d0d0d', borderRadius:3, border:'1px solid #1f1f1f'} },
            h('div', { style:{fontSize:10, color:'#555', fontFamily:'JetBrains Mono,monospace', letterSpacing:'0.08em', marginBottom:8} }, 'TURMA 2026.1 · GESTÃO AUTÔNOMA'),
            h('div', { style:{fontSize:11, color:'#777'} }, 'RM571965 · Ana Julia Neves'),
            h('div', { style:{fontSize:11, color:'#555', marginTop:4} }, 'Dados salvos localmente no navegador.')
          )
        )
      ),

      // ── ADD EVENT MODAL ──────────────────────────────────────────
      showAddEvent && h('div', { style:{position:'fixed',inset:0,zIndex:60,display:'flex',alignItems:'center',justifyContent:'center'} },
        h('div', { onClick:()=>setShowAddEvent(false), style:{position:'absolute',inset:0,background:'rgba(0,0,0,0.7)'} }),
        h('div', { style:{position:'relative',background:'#111',border:'1px solid #222',borderRadius:4,padding:28,width:420,zIndex:61} },
          h('div', { style:{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:20} },
            h('span', { style:{fontFamily:'JetBrains Mono,monospace', fontSize:12, color:'#888', letterSpacing:'0.08em'} }, 'NOVO EVENTO'),
            h('button', { onClick:()=>setShowAddEvent(false), style:{background:'none',border:'none',color:'#555',cursor:'pointer'} }, h(Ic.X,{s:16}))
          ),
          h('div', { style:{display:'flex', flexDirection:'column', gap:12} },
            h('input', { placeholder:'Título do evento', value:newEvent.titulo, onChange:e=>setNewEvent(v=>({...v,titulo:e.target.value})) }),
            h('div', { style:{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10} },
              h('input', { type:'date', value:newEvent.data, onChange:e=>setNewEvent(v=>({...v,data:e.target.value})) }),
              h('input', { type:'time', value:newEvent.hora, onChange:e=>setNewEvent(v=>({...v,hora:e.target.value})), placeholder:'Horário' })
            ),
            h('select', { value:newEvent.cat, onChange:e=>setNewEvent(v=>({...v,cat:e.target.value})) },
              Object.entries(CAT_LABELS).map(([k,l])=>h('option',{key:k,value:k},l))
            ),
            h('div', { style:{display:'flex', gap:10, marginTop:4} },
              h('button', { onClick:addEvent, className:'btn btn-primary', style:{flex:1} }, 'Adicionar'),
              h('button', { onClick:()=>setShowAddEvent(false), className:'btn btn-ghost', style:{flex:1} }, 'Cancelar')
            )
          )
        )
      )

    ); // end return
  } // end App

  createRoot(document.getElementById('root')).render(h(App, null));
</script>

<div id="root"></div>
</body>
</html>
