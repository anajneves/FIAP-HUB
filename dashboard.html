<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>J.One Hub — Ana Julia Neves</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif: ['Newsreader', 'Georgia', 'serif'],
            mono:  ['JetBrains Mono', 'Consolas', 'monospace'],
          }
        }
      }
    }
  </script>

  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    .animate-spin { animation: spin 1s linear infinite; }
    * { box-sizing: border-box; }
  </style>

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="importmap">
  {
    "imports": {
      "react":             "https://esm.sh/react@18",
      "react/jsx-runtime": "https://esm.sh/react@18/jsx-runtime",
      "react-dom/client":  "https://esm.sh/react-dom@18/client",
      "lucide-react":      "https://esm.sh/lucide-react@latest"
    }
  }
  </script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState } from 'react';
    import { createRoot } from 'react-dom/client';
    import {
      Calendar as CalendarIcon, BookOpen, CheckCircle, PlayCircle,
      Moon, Settings, X, Link as LinkIcon, RefreshCw, Check,
      Users, User, Info, ExternalLink, Award
    } from 'lucide-react';

    const Linkedin = ({ size = 18, className = '' }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor" className={className} aria-hidden="true">
        <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
      </svg>
    );

    function DashboardLowStim() {
      const [motionOff, setMotionOff]     = useState(true);
      const [showTweaks, setShowTweaks]   = useState(false);
      const [isSyncing, setIsSyncing]     = useState(false);
      const [syncSuccess, setSyncSuccess] = useState(false);

      const fiapAccount     = "rm571965";
      const aluraAccount    = "anajuliamedicina@gmail.com";
      const linkedinAccount = "linkedin.com/in/anajuneves";

      const eventoPrincipal = {
        titulo:        "Conhecendo o Cliente com Profundidade",
        contexto:      "Desafio em Grupo",
        prazoRegular:  "14 Mai 2026",
        prazoAdaptado: "21 Mai 2026",
        diasRestantes: 25,
      };

      const tarefasPendentes = [
        { id: 3, titulo: "Quiz Fase 3 + Fast Test (Nice to meet you...)", tipo: "Individual", icone: User,  prazoRegular: "19 Mai 2026", prazoAdaptado: "26 Mai 2026" },
        { id: 6, titulo: "Challenge Santander Open Academy + Alura",       tipo: "Grupo",      icone: Users, prazoRegular: "19 Mai 2026", prazoAdaptado: "26 Mai 2026" },
        { id: 4, titulo: "Achar grupo para Challenge Santander",            tipo: "Setup",      icone: Info,  prazoRegular: "01 Jun 2026", prazoAdaptado: "08 Jun 2026" },
        { id: 1, titulo: "Quiz Fase 1 (Basics Fundamentals)",               tipo: "Individual", icone: User,  prazoRegular: "20 Jun 2026", prazoAdaptado: "27 Jun 2026" },
        { id: 2, titulo: "Quiz Fase 2 + Fast Test (Deep Dive...)",          tipo: "Individual", icone: User,  prazoRegular: "20 Jun 2026", prazoAdaptado: "27 Jun 2026" },
      ];

      const nanoCourses = [
        { id: 1, titulo: "Customer Experience Management", Carga: "40h", status: "Disponivel",  imagemBg: "from-pink-900/40 to-zinc-900" },
        { id: 2, titulo: "Agile Culture & Methodologies",  Carga: "60h", status: "Em Progresso", imagemBg: "from-blue-900/40 to-zinc-900",    progresso: 45 },
        { id: 3, titulo: "Data Driven Decision Making",    Carga: "30h", status: "Disponivel",  imagemBg: "from-emerald-900/40 to-zinc-900" },
      ];

      const handleSync = () => {
        setIsSyncing(true);
        setSyncSuccess(false);
        setTimeout(() => {
          setIsSyncing(false);
          setSyncSuccess(true);
          setTimeout(() => setSyncSuccess(false), 3000);
        }, 1500);
      };

      return (
        <div className={`min-h-screen ${motionOff ? 'bg-[#050505]' : 'bg-[#000000]'} text-zinc-300 font-sans transition-colors duration-500 relative overflow-x-hidden pb-12`}>
          <div className="max-w-7xl mx-auto px-6 lg:px-12 py-8 relative z-10">

            {/* Header */}
            <header className="border-b border-zinc-900 pb-6 mb-8 flex justify-between items-end flex-wrap gap-4">
              <div className="flex items-center gap-5">
                <div className="relative">
                  <div className="w-16 h-16 rounded-full overflow-hidden border-2 border-[#ED145B]/30 p-0.5 bg-zinc-800 flex items-center justify-center">
                    <span className="font-serif text-xl text-zinc-300">AJ</span>
                  </div>
                  <div className="absolute bottom-0 right-0 w-4 h-4 bg-[#ED145B] border-2 border-[#050505] rounded-full" />
                </div>
                <div>
                  <h1 className="font-serif text-2xl text-zinc-100 leading-tight tracking-tight mb-1">Ana Julia Neves</h1>
                  <div className="font-mono text-[10px] uppercase tracking-widest text-zinc-500 flex flex-col gap-0.5">
                    <span>RM571965 · J.One Hub</span>
                    <span className="text-[#ED145B]">Turma 2026.1 · Gestao Autonoma</span>
                  </div>
                </div>
              </div>
              <div className="flex items-center gap-4">
                <button
                  onClick={() => setMotionOff(!motionOff)}
                  className={`flex items-center gap-2 font-mono text-[10px] uppercase tracking-widest px-3 py-1.5 rounded-full border transition-all ${motionOff ? 'border-zinc-700 text-zinc-300 bg-zinc-900/50' : 'border-zinc-800 text-zinc-500 hover:text-zinc-300'}`}
                >
                  <Moon size={12} /> {motionOff ? 'Low-Stim Ativo' : 'Ativar Low-Stim'}
                </button>
                <button
                  onClick={() => setShowTweaks(true)}
                  className="flex items-center gap-2 font-mono text-[10px] uppercase tracking-widest text-zinc-500 hover:text-zinc-300 transition-colors"
                >
                  <Settings size={14} /> Sistema
                </button>
              </div>
            </header>

            <main className="grid grid-cols-1 lg:grid-cols-12 gap-4">

              {/* Links rápidos */}
              <section className="lg:col-span-12 grid grid-cols-1 md:grid-cols-3 gap-4 mb-2">
                <a href="https://on.fiap.com.br/local/home/" target="_blank" rel="noopener noreferrer"
                  className="flex items-center justify-between p-4 border border-zinc-900 bg-[#0A0A0A] rounded-sm hover:border-[#ED145B]/50 hover:bg-[#ED145B]/5 transition-all group cursor-pointer">
                  <div className="flex items-center gap-4">
                    <div className="w-10 h-10 rounded-sm bg-zinc-900 flex items-center justify-center p-2 group-hover:bg-[#ED145B]/10 transition-colors">
                      <BookOpen size={18} className="text-[#ED145B]" />
                    </div>
                    <div>
                      <h3 className="font-serif text-zinc-200 group-hover:text-white transition-colors">FIAP ON</h3>
                      <p className="font-mono text-[9px] uppercase tracking-widest text-zinc-500 mt-1">Ambiente Oficial</p>
                    </div>
                  </div>
                  <ExternalLink size={16} className="text-zinc-700 group-hover:text-[#ED145B] transition-colors" />
                </a>

                <a href="https://app.alura.com.br/" target="_blank" rel="noopener noreferrer"
                  className="flex items-center justify-between p-4 border border-zinc-900 bg-[#0A0A0A] rounded-sm hover:border-zinc-700 hover:bg-zinc-900/80 transition-all group cursor-pointer">
                  <div className="flex items-center gap-4">
                    <div className="w-10 h-10 rounded-sm bg-zinc-900 flex items-center justify-center p-2.5 group-hover:bg-zinc-800 transition-colors">
                      <PlayCircle size={18} className="text-zinc-400" />
                    </div>
                    <div>
                      <h3 className="font-serif text-zinc-200 group-hover:text-white transition-colors">Alura</h3>
                      <p className="font-mono text-[9px] uppercase tracking-widest text-zinc-500 mt-1">Cursos & Skills</p>
                    </div>
                  </div>
                  <ExternalLink size={16} className="text-zinc-700 group-hover:text-zinc-300 transition-colors" />
                </a>

                <a href="https://linkedin.com/in/anajuneves" target="_blank" rel="noopener noreferrer"
                  className="flex items-center justify-between p-4 border border-zinc-900 bg-[#0A0A0A] rounded-sm hover:border-[#0a66c2]/50 hover:bg-[#0a66c2]/5 transition-all group cursor-pointer">
                  <div className="flex items-center gap-4">
                    <div className="w-10 h-10 rounded-sm bg-zinc-900 flex items-center justify-center text-zinc-500 group-hover:text-[#0a66c2] group-hover:bg-[#0a66c2]/20 transition-colors">
                      <Linkedin size={18} />
                    </div>
                    <div>
                      <h3 className="font-serif text-zinc-200 group-hover:text-white transition-colors">LinkedIn</h3>
                      <p className="font-mono text-[9px] uppercase tracking-widest text-zinc-500 mt-1">Networking Profissional</p>
                    </div>
                  </div>
                  <ExternalLink size={16} className="text-zinc-700 group-hover:text-[#0a66c2] transition-colors" />
                </a>
              </section>

              {/* Acao Prioritaria */}
              <section className="lg:col-span-8 border border-zinc-900 bg-[#0A0A0A] p-8 rounded-sm relative overflow-hidden flex flex-col justify-between group">
                <div className="absolute top-4 right-4 flex items-center gap-1.5 text-[9px] font-mono uppercase tracking-widest text-emerald-500/70 border border-emerald-900/30 bg-emerald-900/10 px-2 py-1 rounded-sm">
                  <LinkIcon size={10} /> Sync: FIAP ON
                </div>
                <div className="flex justify-between items-start mb-8 mt-2">
                  <div>
                    <div className="font-mono text-[10px] uppercase tracking-widest text-[#ED145B] mb-3">Acao Prioritaria</div>
                    <h2 className="font-serif text-3xl font-medium text-zinc-100 mb-2">{eventoPrincipal.titulo}</h2>
                    <p className="font-serif text-zinc-400 flex items-center gap-2">
                      <Users size={14} /> {eventoPrincipal.contexto}
                    </p>
                  </div>
                  <div className="text-right flex-shrink-0 ml-4">
                    <div className="font-serif text-4xl text-zinc-100">{eventoPrincipal.diasRestantes}</div>
                    <div className="font-mono text-[9px] uppercase tracking-widest text-zinc-500 mt-1">Dias de Margem</div>
                  </div>
                </div>
                <div className="grid grid-cols-2 gap-px bg-zinc-900 border border-zinc-900 rounded-sm overflow-hidden">
                  <div className="bg-[#111111] p-4">
                    <div className="font-mono text-[9px] uppercase tracking-widest text-zinc-600 mb-1">Prazo Regular (Turma)</div>
                    <div className="font-mono text-sm text-zinc-500 line-through decoration-zinc-700">{eventoPrincipal.prazoRegular}</div>
                  </div>
                  <div className="bg-[#141414] p-4 border-l border-zinc-800">
                    <div className="font-mono text-[9px] uppercase tracking-widest text-[#ED145B] mb-1">O Seu Prazo Adaptado</div>
                    <div className="font-mono text-sm text-zinc-100">{eventoPrincipal.prazoAdaptado}</div>
                  </div>
                </div>
              </section>

              {/* Agenda */}
              <section className="lg:col-span-4 border border-zinc-900 bg-[#0A0A0A] p-6 rounded-sm flex flex-col">
                <div className="font-mono text-[10px] uppercase tracking-widest text-zinc-500 mb-6 flex justify-between">
                  <span>Agenda Unificada</span>
                  <CalendarIcon size={14} />
                </div>
                <div className="space-y-5 flex-1">
                  <div className="border-l-2 border-zinc-300 pl-4 py-1 relative">
                    <div className="absolute -left-[9px] top-1.5 w-[14px] h-[14px] rounded-full bg-[#0A0A0A] border border-zinc-300" />
                    <div className="flex justify-between items-center mb-1">
                      <div className="font-mono text-[10px] text-zinc-300">Seg, 27 Abr · 19:30</div>
                      <div className="text-[8px] font-mono uppercase bg-zinc-800 text-zinc-300 px-1.5 py-0.5 rounded-sm">Saude</div>
                    </div>
                    <div className="font-serif text-zinc-200">Sessao Psiquiatria</div>
                  </div>
                  <div className="border-l-2 border-zinc-600 pl-4 py-1 relative">
                    <div className="absolute -left-[9px] top-1.5 w-[14px] h-[14px] rounded-full bg-[#0A0A0A] border border-zinc-600" />
                    <div className="flex justify-between items-center mb-1">
                      <div className="font-mono text-[10px] text-zinc-500">Ter, 28 Abr · 11:30</div>
                      <div className="text-[8px] font-mono uppercase bg-zinc-900 text-zinc-500 px-1.5 py-0.5 rounded-sm">Lucca</div>
                    </div>
                    <div className="font-serif text-zinc-400">Daily | Social Media</div>
                  </div>
                  <div className="border-l-2 border-[#ED145B] pl-4 py-1 relative">
                    <div className="absolute -left-[9px] top-1.5 w-[14px] h-[14px] rounded-full bg-[#0A0A0A] border border-[#ED145B]" />
                    <div className="flex justify-between items-center mb-1">
                      <div className="font-mono text-[10px] text-[#ED145B]">Qua, 29 Abr · 22:30</div>
                      <div className="text-[8px] font-mono uppercase bg-[#ED145B]/10 text-[#ED145B] px-1.5 py-0.5 rounded-sm">FIAP</div>
                    </div>
                    <div className="font-serif text-zinc-100">[Live] Jornada do Consumidor</div>
                  </div>
                </div>
              </section>

              {/* Pipeline de Entregas */}
              <section className="lg:col-span-12 border border-zinc-900 bg-[#0A0A0A] p-6 rounded-sm mt-2">
                <div className="font-mono text-[10px] uppercase tracking-widest text-zinc-500 mb-6 flex justify-between border-b border-zinc-900 pb-3">
                  <span>Pipeline de Entregas (FIAP ON + Alura)</span>
                  <CheckCircle size={14} />
                </div>
                <div className="space-y-3">
                  {tarefasPendentes.map((tarefa) => {
                    const Icone = tarefa.icone;
                    return (
                      <div key={tarefa.id}
                        className="flex flex-col md:flex-row md:items-center justify-between p-4 border border-zinc-900 bg-[#111111] rounded-sm hover:border-[#ED145B]/40 transition-colors group">
                        <div className="flex items-center gap-4 mb-3 md:mb-0">
                          <div className="w-8 h-8 rounded-full bg-zinc-900 flex items-center justify-center text-zinc-500 group-hover:text-[#ED145B] transition-colors flex-shrink-0">
                            <Icone size={14} />
                          </div>
                          <div>
                            <h4 className="font-serif text-sm text-zinc-300 group-hover:text-zinc-100 transition-colors">{tarefa.titulo}</h4>
                            <span className="font-mono text-[9px] uppercase tracking-widest text-zinc-600">{tarefa.tipo}</span>
                          </div>
                        </div>
                        <div className="flex items-center gap-6 text-right flex-shrink-0">
                          <div>
                            <div className="font-mono text-[9px] uppercase tracking-widest text-zinc-700 mb-0.5">Prazo Base</div>
                            <div className="font-mono text-xs text-zinc-600 line-through decoration-zinc-800">{tarefa.prazoRegular}</div>
                          </div>
                          <div className="border-l border-zinc-800 pl-6">
                            <div className="font-mono text-[9px] uppercase tracking-widest text-[#ED145B]/80 mb-0.5 group-hover:text-[#ED145B] transition-colors">O Seu Prazo</div>
                            <div className="font-mono text-xs text-zinc-300 group-hover:text-white transition-colors">{tarefa.prazoAdaptado}</div>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </section>

              {/* Nano Courses */}
              <section className="lg:col-span-12 border border-zinc-900 bg-[#0A0A0A] p-6 rounded-sm mt-2">
                <div className="font-mono text-[10px] uppercase tracking-widest text-zinc-500 mb-6 flex justify-between border-b border-zinc-900 pb-3">
                  <span>Nano Courses FIAP (Extracurriculares)</span>
                  <Award size={14} />
                </div>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                  {nanoCourses.map((course) => (
                    <div key={course.id}
                      className="border border-zinc-900 bg-[#111111] rounded-sm overflow-hidden group hover:border-[#ED145B]/30 transition-all flex flex-col">
                      <div className={`h-28 bg-gradient-to-br ${course.imagemBg} relative`}>
                        <div className="absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(0,0,0,0)_0%,rgba(0,0,0,0.8)_100%)]" />
                        {course.progresso && (
                          <div className="absolute bottom-0 left-0 w-full h-1 bg-zinc-900">
                            <div className="h-full bg-[#ED145B]" style={{ width: `${course.progresso}%` }} />
                          </div>
                        )}
                        <div className="absolute top-2 left-2 bg-zinc-900/80 backdrop-blur-sm text-zinc-300 text-[9px] font-mono uppercase px-2 py-1 rounded-sm border border-zinc-800">
                          {course.status}
                        </div>
                      </div>
                      <div className="p-5 flex flex-col flex-1">
                        <h4 className="font-serif text-base text-zinc-200 leading-tight group-hover:text-white mb-2">{course.titulo}</h4>
                        <p className="font-mono text-[9px] uppercase tracking-widest text-zinc-500 mb-6">Nano Course · {course.Carga}</p>
                        <button className="mt-auto w-full bg-zinc-900 hover:bg-[#ED145B] text-zinc-300 hover:text-white border border-zinc-800 hover:border-[#ED145B] font-mono text-[10px] uppercase tracking-widest py-2.5 rounded-sm transition-all flex justify-center items-center gap-2">
                          <PlayCircle size={12} /> {course.progresso ? 'Continuar Curso' : 'Iniciar Curso'}
                        </button>
                      </div>
                    </div>
                  ))}
                </div>
              </section>

            </main>
          </div>

          {/* Painel Sistema */}
          {showTweaks && (
            <>
              <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-40" onClick={() => setShowTweaks(false)} />
              <div className="fixed top-0 right-0 h-full w-full max-w-md bg-[#0A0A0A] border-l border-zinc-900 z-50 p-6 shadow-2xl flex flex-col overflow-y-auto">
                <div className="flex justify-between items-center mb-8">
                  <h3 className="font-serif text-xl text-zinc-100 flex items-center gap-2">
                    <Settings size={18} className="text-zinc-500" /> Contas & Sistema
                  </h3>
                  <button onClick={() => setShowTweaks(false)} className="text-zinc-500 hover:text-zinc-200 transition-colors">
                    <X size={20} />
                  </button>
                </div>
                <div className="space-y-8 flex-1">
                  <div className="space-y-4">
                    <label className="font-mono text-[10px] uppercase tracking-widest text-zinc-500 block border-b border-zinc-900 pb-2">
                      Credenciais Academicas
                    </label>

                    <div className="bg-[#111111] border border-zinc-900 p-3 rounded-sm">
                      <div className="flex justify-between items-center mb-2">
                        <span className="font-serif text-sm text-zinc-200 flex items-center gap-2">
                          <BookOpen size={12} className="text-[#ED145B]" /> Portal FIAP ON
                        </span>
                        <span className="text-[8px] font-mono uppercase bg-emerald-900/30 text-emerald-500 px-1.5 py-0.5 rounded-sm">Conectado</span>
                      </div>
                      <div className="font-mono text-[10px] text-zinc-500 space-y-1">
                        <div>Login: <span className="text-zinc-400">{fiapAccount}</span></div>
                        <div>Senha: <span className="text-zinc-600 tracking-[0.2em]">············</span></div>
                      </div>
                    </div>

                    <div className="bg-[#111111] border border-zinc-900 p-3 rounded-sm">
                      <div className="flex justify-between items-center mb-2">
                        <span className="font-serif text-sm text-zinc-200 flex items-center gap-2">
                          <PlayCircle size={12} className="text-zinc-400" /> Plataforma Alura
                        </span>
                        <span className="text-[8px] font-mono uppercase bg-emerald-900/30 text-emerald-500 px-1.5 py-0.5 rounded-sm">Conectado</span>
                      </div>
                      <div className="font-mono text-[10px] text-zinc-500 space-y-1">
                        <div>Login: <span className="text-zinc-400">{aluraAccount}</span></div>
                        <div>Senha: <span className="text-zinc-600 tracking-[0.2em]">········</span></div>
                      </div>
                    </div>

                    <div className="bg-[#111111] border border-zinc-900 p-3 rounded-sm">
                      <div className="flex justify-between items-center mb-2">
                        <span className="font-serif text-sm text-zinc-200 flex items-center gap-2">
                          <Linkedin size={12} className="text-[#ED145B]" /> LinkedIn
                        </span>
                        <span className="text-[8px] font-mono uppercase bg-emerald-900/30 text-emerald-500 px-1.5 py-0.5 rounded-sm">Conectado</span>
                      </div>
                      <div className="font-mono text-[10px] text-zinc-500">
                        <div>URL: <a href={`https://${linkedinAccount}`} target="_blank" rel="noopener noreferrer"
                          className="text-zinc-400 hover:text-[#ED145B] transition-colors">{linkedinAccount}</a></div>
                      </div>
                    </div>

                    <button
                      onClick={handleSync}
                      disabled={isSyncing || syncSuccess}
                      className={`w-full font-mono text-[10px] uppercase tracking-widest py-2.5 rounded-sm transition-all flex justify-center items-center gap-2 mt-4
                        ${syncSuccess
                          ? 'bg-emerald-900/20 text-emerald-500 border border-emerald-900/30'
                          : isSyncing
                            ? 'bg-zinc-900 text-zinc-600 cursor-not-allowed border border-zinc-800'
                            : 'bg-[#111111] hover:bg-zinc-900 border border-zinc-800 text-zinc-300'}`}
                    >
                      {syncSuccess
                        ? <><Check size={12} /> Dados Atualizados</>
                        : isSyncing
                          ? <><RefreshCw size={12} className="animate-spin" /> Conectando via API...</>
                          : <><RefreshCw size={12} /> Forcar Sincronizacao</>}
                    </button>
                  </div>
                </div>
              </div>
            </>
          )}

        </div>
      );
    }

    createRoot(document.getElementById('root')).render(<DashboardLowStim />);
  </script>
</body>
</html>
